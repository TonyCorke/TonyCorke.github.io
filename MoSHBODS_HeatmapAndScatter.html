<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MoSHBODS Team Ratings — V/AFL 1897–2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f5f7;
    --surface: #ffffff;
    --surface2: #eaecf1;
    --border: #d0d4de;
    --text: #1a1e2e;
    --text-dim: #5a6180;
    --text-mid: #3d4460;
    --accent: #c47a00;
    --accent2: #c0392b;
    --positive: #1a9e97;
    --negative: #c0392b;
    --zero: #9099b8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow: hidden;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-weight: 300;
    max-width: 1000px;
    margin: 0 auto;
  }

  header {
    padding: 18px 20px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    gap: 16px;
    flex-wrap: wrap;
  }

  header h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 1.6rem;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--text);
  }

  header h1 span { color: var(--accent); }

  header p {
    color: var(--text-dim);
    font-size: 0.85rem;
    letter-spacing: 0.02em;
  }

  .layout {
    display: grid;
    grid-template-columns: 230px 1fr;
    min-height: calc(100vh - 85px);
    max-width: 1000px;
    width: 100%;
  }

  /* SIDEBAR */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-section {
    padding: 16px 16px 12px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 10px;
  }

  /* View toggle */
  .view-toggle {
    display: flex;
    gap: 4px;
  }
  .view-btn {
    flex: 1;
    padding: 7px 6px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-mid);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
    border-radius: 3px;
  }
  .view-btn:hover { border-color: var(--accent); color: var(--accent); }
  .view-btn.active { background: var(--accent); border-color: var(--accent); color: #000; }

  /* Metric toggle */
  .metric-toggle {
    display: flex;
    gap: 4px;
  }
  .metric-btn {
    flex: 1;
    padding: 6px 4px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-mid);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
    border-radius: 3px;
  }
  .metric-btn:hover { border-color: var(--positive); color: var(--positive); }
  .metric-btn.active { background: var(--positive); border-color: var(--positive); color: #000; }
  .metric-btn.active.def-btn { background: var(--accent2); border-color: var(--accent2); }

  /* Team list */
  .team-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
  }
  .team-list::-webkit-scrollbar { width: 4px; }
  .team-list::-webkit-scrollbar-track { background: transparent; }
  .team-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .team-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 16px;
    cursor: pointer;
    transition: background 0.1s;
    border-left: 3px solid transparent;
  }
  .team-item:hover { background: var(--surface2); }
  .team-item.active {
    background: var(--surface2);
    border-left-color: var(--accent);
  }
  .team-item.highlighted {
    border-left-color: var(--positive);
    background: rgba(78,205,196,0.05);
  }
  .team-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
    opacity: 0.9;
  }
  .team-name {
    font-size: 0.82rem;
    font-weight: 400;
    color: var(--text);
    flex: 1;
  }
  .team-era {
    font-size: 0.68rem;
    color: var(--text-dim);
    font-family: 'Barlow Condensed', sans-serif;
  }

  .all-toggle {
    display: flex;
    gap: 6px;
    padding: 0 16px 8px;
  }
  .all-btn {
    font-size: 0.68rem;
    font-family: 'Barlow Condensed', sans-serif;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-dim);
    cursor: pointer;
    text-decoration: underline;
    background: none;
    border: none;
    padding: 2px 0;
  }
  .all-btn:hover { color: var(--accent); }

  /* MAIN AREA */
  .main {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .chart-area {
    flex: 1;
    position: relative;
    padding: 12px 20px 0;
  }

  #main-chart {
    width: 100%;
    height: 100%;
  }

  /* Tooltip */
  .tooltip {
    position: fixed;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 10px 14px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.1s;
    font-size: 0.8rem;
    z-index: 100;
    min-width: 170px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  }
  .tooltip.visible { opacity: 1; }
  .tt-team {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    margin-bottom: 4px;
  }
  .tt-row { display: flex; justify-content: space-between; gap: 16px; margin-top: 2px; }
  .tt-label { color: var(--text-dim); }
  .tt-val { font-weight: 500; }
  .tt-val.pos { color: var(--positive); }
  .tt-val.neg { color: var(--negative); }

  /* Bottom info bar */
  .info-bar {
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 8px 20px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-wrap: wrap;
  }
  .info-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.72rem;
    color: var(--text-dim);
  }
  .info-swatch {
    width: 24px;
    height: 3px;
    border-radius: 2px;
  }
  .info-swatch.dashed {
    background: repeating-linear-gradient(90deg, var(--text-dim) 0, var(--text-dim) 4px, transparent 4px, transparent 8px);
  }

  /* Year range display */
  .year-display {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 0.85rem;
    color: var(--accent);
    margin-left: auto;
  }

  .heatmap-area {
    overflow: auto;
  }

  /* Scatter view */
  #scatter-chart {
    width: 100%;
    height: 100%;
  }

  /* Year scrubber */
  .scrubber-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 12px 8px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .scrubber-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-dim);
    white-space: nowrap;
  }
  input[type=range] {
    -webkit-appearance: none;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    border: 2px solid var(--bg);
  }
  #year-scrubber {
    flex: 1;
  }
  .scrubber-year {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 1.1rem;
    color: var(--accent);
    min-width: 42px;
    text-align: right;
  }
  .play-btn {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-mid);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .play-btn:hover { border-color: var(--accent); color: var(--accent); }
  .play-btn.playing { border-color: var(--accent); background: var(--accent); color: #000; }

  /* Chart SVG styles */
  .axis path, .axis line { stroke: var(--border); }
  .axis text { fill: var(--text-mid); font-family: 'Barlow Condensed', sans-serif; font-size: 11px; }
  .grid line { stroke: var(--border); stroke-opacity: 0.5; }
  .zero-line { stroke: var(--zero); stroke-width: 1.5; stroke-dasharray: 4,4; }

  .view-hidden { display: none !important; }

</style>
</head>

</header>

<div class="layout">

      </div>
    </div>

    </div>

    <div class="sidebar-section" style="padding-bottom:8px;">

    </div>

    <div class="team-list" id="team-list"></div>

  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- SCATTER VIEW -->
    <div id="view-scatter" class="chart-area" style="height:calc(100vh - 85px - 110px);">
      <svg id="scatter-chart"></svg>

    <div id="view-heatmap" class="view-hidden heatmap-area" style="height:calc(100vh - 85px - 50px);overflow:auto;padding:12px 8px 12px 8px;">

    </div>

    <!-- NETWORK VIEW -->
    <div id="view-network" class="view-hidden chart-area" style="height:calc(100vh - 85px - 110px);">
      <svg id="network-chart"></svg>
    </div>

    <!-- NETWORK CONTROLS (network only) -->
    <div id="network-controls-row" class="view-hidden" style="border-top:1px solid var(--border);background:var(--surface);flex-shrink:0;">
      <div class="scrubber-row" style="border-top:none;padding-bottom:2px;">
        <span class="scrubber-label">Min |r|</span>
        <input type="range" id="threshold-slider" min="0.1" max="0.9" value="0.4" step="0.05" style="flex:1;">
        <span class="scrubber-year" id="threshold-label" style="min-width:34px;font-size:0.95rem;">0.40</span>
        <span class="scrubber-label" style="margin-left:16px;">Min seasons</span>
        <input type="range" id="minseas-slider" min="5" max="60" value="15" step="5" style="flex:1;">
        <span class="scrubber-year" id="minseas-label" style="min-width:26px;font-size:0.95rem;">15</span>
      </div>
      <div class="scrubber-row" style="border-top:none;padding-top:2px;">
        <span class="scrubber-label">From</span>
        <input type="range" id="yearfrom-slider" min="1897" max="2026" value="1897" step="1" style="flex:1;">
        <span class="scrubber-year" id="yearfrom-label" style="min-width:36px;font-size:0.95rem;">1897</span>
        <span class="scrubber-label" style="margin-left:16px;">To</span>
        <input type="range" id="yearto-slider" min="1897" max="2026" value="2026" step="1" style="flex:1;">
        <span class="scrubber-year" id="yearto-label" style="min-width:36px;font-size:0.95rem;">2026</span>
      </div>
    </div>

    <!-- SCRUBBER (scatter only) -->
    <div id="scrubber-row" class="scrubber-row view-hidden">
      <span class="scrubber-label">Season</span>
      <button class="play-btn" id="play-btn">▶</button>
      <input type="range" id="year-scrubber" min="1897" max="2026" value="2026" step="1">
      <span class="scrubber-year" id="scrubber-year-label">2026</span>
    </div>

    <!-- INFO BAR -->
    <div class="info-bar" id="info-bar">
      <div class="info-item">
        <div class="info-swatch" style="background:var(--positive)"></div>
        <span>Positive = above average</span>
      </div>
      <div class="info-item">
        <div class="info-swatch" style="background:var(--negative)"></div>
        <span>Negative = below average</span>
      </div>
      <div class="info-item" style="margin-left:auto; color:var(--text-mid); font-family:'Barlow Condensed',sans-serif; letter-spacing:0.04em;">
        Season-start ratings · Hover dots for details
      </div>
    </div>

  </main>
</div>

function buildTeamList() {
  const list = document.getElementById('team-list');
  list.innerHTML = '';
  ALL_TEAMS.forEach(team => {
    const seasons = RAW[team];
    const minYr = seasons[0][0], maxYr = seasons[seasons.length-1][0];
    const isActive = CURRENT_TEAMS.has(team);
    const div = document.createElement('div');
    div.className = 'team-item' + (selectedTeams.has(team) ? ' active' : '');
    div.dataset.team = team;
    div.innerHTML = `
      <div class="team-dot" style="background:${TEAM_COLORS[team] || '#888'}"></div>
      <span class="team-name">${team}</span>
      <span class="team-era">${minYr}${isActive ? '–' : '–' + maxYr}</span>
    `;
    div.addEventListener('click', () => toggleTeam(team));
    list.appendChild(div);
  });
}

function toggleTeam(team) {
  if (selectedTeams.has(team)) selectedTeams.delete(team);
  else selectedTeams.add(team);
  document.querySelectorAll('.team-item').forEach(el => {
    el.classList.toggle('active', selectedTeams.has(el.dataset.team));
  });
  renderCurrentView();
}

document.getElementById('btn-select-all').addEventListener('click', () => {
  ALL_TEAMS.forEach(t => selectedTeams.add(t));
  document.querySelectorAll('.team-item').forEach(el => el.classList.add('active'));
  renderCurrentView();
});
document.getElementById('btn-clear-all').addEventListener('click', () => {
  selectedTeams.clear();
  document.querySelectorAll('.team-item').forEach(el => el.classList.remove('active'));
  renderCurrentView();
});
document.getElementById('btn-current').addEventListener('click', () => {
  selectedTeams = new Set(CURRENT_TEAMS);
  document.querySelectorAll('.team-item').forEach(el => {
    el.classList.toggle('active', selectedTeams.has(el.dataset.team));
  });
  renderCurrentView();
});

// ============================================================
// VIEW SWITCHING
// ============================================================
document.querySelectorAll('.view-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentView = btn.dataset.view;
    if (networkSimulation && currentView !== 'network') { networkSimulation.stop(); }
    showView(currentView);
    renderCurrentView();
  });
});

document.querySelectorAll('.metric-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.metric-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    metric = btn.dataset.metric;
    renderCurrentView();
  });
});

function showView(view) {
  document.getElementById('view-scatter').classList.toggle('view-hidden', view !== 'scatter');
  document.getElementById('view-heatmap').classList.toggle('view-hidden', view !== 'heatmap');
  document.getElementById('view-network').classList.toggle('view-hidden', view !== 'network');
  document.getElementById('scrubber-row').classList.toggle('view-hidden', view !== 'scatter');
  document.getElementById('network-controls-row').classList.toggle('view-hidden', view !== 'network');
}

function renderCurrentView() {
  if (currentView === 'scatter') renderScatter();
  else if (currentView === 'network') renderNetwork();
  else renderHeatmap();
}

// ============================================================
// TOOLTIP
// ============================================================
const tooltip = document.getElementById('tooltip');
function showTooltip(e, html) {
  tooltip.innerHTML = html;
  tooltip.classList.add('visible');
  moveTooltip(e);
}
function moveTooltip(e) {
  const pad = 16;
  let x = e.clientX + pad, y = e.clientY + pad;
  const tw = tooltip.offsetWidth, th = tooltip.offsetHeight;
  if (x + tw > window.innerWidth) x = e.clientX - tw - pad;
  if (y + th > window.innerHeight) y = e.clientY - th - pad;
  tooltip.style.left = x + 'px';
  tooltip.style.top = y + 'px';
}
function hideTooltip() { tooltip.classList.remove('visible'); }
document.addEventListener('mousemove', e => { if (tooltip.classList.contains('visible')) moveTooltip(e); });

function renderScatter() {
  const container = document.getElementById('view-scatter');
  const svg = d3.select('#scatter-chart');
  svg.selectAll('*').remove();

  const W = container.clientWidth;
  const H = container.clientHeight;
  const margin = { top: 36, right: 16, bottom: 46, left: 48 };
  const iW = W - margin.left - margin.right;
  const iH = H - margin.top - margin.bottom;

  svg.attr('width', W).attr('height', H);
  const g = svg.append('g').attr('transform', `translate(${margin.left},${margin.top})`);

  // Scales based on all data
  const xScale = d3.scaleLinear().domain([-1.3, 1.3]).range([0, iW]).nice();
  const yScale = d3.scaleLinear().domain([-1.3, 1.3]).range([iH, 0]).nice();

  // Quadrant shading
  const qColors = ['rgba(78,205,196,0.04)','rgba(150,150,200,0.04)','rgba(224,92,92,0.04)','rgba(150,150,200,0.04)'];
  [[0,0,iW/2,iH/2],[iW/2,0,iW/2,iH/2],[0,iH/2,iW/2,iH/2],[iW/2,iH/2,iW/2,iH/2]].forEach((q,i) => {
    g.append('rect').attr('x',q[0]).attr('y',q[1]).attr('width',q[2]).attr('height',q[3]).attr('fill',qColors[i]);
  });

  // Quad labels — positive off = right, positive def = top (both good)
  const qLabels = [
    {x:iW*0.25, y:16,    label:'Off ✗  Def ✓', col:'rgba(150,120,0,0.5)'},
    {x:iW*0.75, y:16,    label:'Off ✓  Def ✓', col:'rgba(20,140,130,0.6)'},
    {x:iW*0.25, y:iH-8,  label:'Off ✗  Def ✗', col:'rgba(180,50,50,0.6)'},
    {x:iW*0.75, y:iH-8,  label:'Off ✓  Def ✗', col:'rgba(150,120,0,0.5)'},
  ];
  qLabels.forEach(q => {
    g.append('text').attr('x',q.x).attr('y',q.y)
      .attr('text-anchor','middle').attr('fill',q.col)
      .attr('font-family','Barlow Condensed,sans-serif').attr('font-size','10px').attr('font-weight','600')
      .attr('letter-spacing','0.05em')
      .text(q.label);
  });

  // Axis lines through zero
  g.append('line').attr('x1',xScale(0)).attr('x2',xScale(0)).attr('y1',0).attr('y2',iH)
    .attr('stroke','var(--zero)').attr('stroke-width',1.5).attr('stroke-dasharray','4,4');
  g.append('line').attr('x1',0).attr('x2',iW).attr('y1',yScale(0)).attr('y2',yScale(0))
    .attr('stroke','var(--zero)').attr('stroke-width',1.5).attr('stroke-dasharray','4,4');

  // Axes
  g.append('g').attr('class','axis').attr('transform',`translate(0,${iH})`).call(d3.axisBottom(xScale).ticks(8).tickFormat(d3.format('+.1f')))
    .call(ax=>ax.select('.domain').remove());
  g.append('g').attr('class','axis').call(d3.axisLeft(yScale).ticks(8).tickFormat(d3.format('+.1f')))
    .call(ax=>ax.select('.domain').remove());

  // Axis labels
  g.append('text').attr('x',iW/2).attr('y',iH+38).attr('text-anchor','middle')
    .attr('fill','var(--text-dim)').attr('font-family','Barlow Condensed,sans-serif').attr('font-size','11px').attr('letter-spacing','0.08em')
    .text('OFFENSIVE RATING');
  g.append('text').attr('transform',`rotate(-90)`).attr('x',-iH/2).attr('y',-38)
    .attr('text-anchor','middle').attr('fill','var(--text-dim)')
    .attr('font-family','Barlow Condensed,sans-serif').attr('font-size','11px').attr('letter-spacing','0.08em')
    .text('DEFENSIVE RATING');

  // Year label — top left
  g.append('text').attr('x', 4).attr('y', -8).attr('text-anchor','start')
    .attr('fill','var(--accent)').attr('font-family','Barlow Condensed,sans-serif').attr('font-size','26px').attr('font-weight','900')
    .attr('id','scatter-year-label')
    .text(scatterYear);

  // Dots
  const activeTeams = ALL_TEAMS.filter(t => selectedTeams.has(t));

  activeTeams.forEach(team => {
    const seasons = RAW[team];
    const season = seasons.find(r => r[0] === scatterYear);
    if (!season) return;

    const color = TEAM_COLORS[team] || '#888';
    const offVal = season[1]; // start_off
    const defVal = season[2]; // start_def

    const dotG = g.append('g').attr('class','scatter-dot').attr('cursor','pointer');
    dotG.append('circle')
      .attr('cx', xScale(offVal)).attr('cy', yScale(defVal))
      .attr('r', 14).attr('fill', color).attr('fill-opacity', 0.85)
      .attr('stroke','var(--bg)').attr('stroke-width', 1.5);

    dotG.append('text')
      .attr('x', xScale(offVal)).attr('y', yScale(defVal))
      .attr('text-anchor','middle').attr('dominant-baseline','middle')
      .attr('fill','#fff').attr('font-family','Barlow Condensed,sans-serif')
      .attr('font-size','12px').attr('font-weight','700').attr('pointer-events','none')
      .text(team.slice(0,3).toUpperCase());

    dotG.on('mouseover', (event) => {
      showTooltip(event, `
        <div class="tt-team" style="color:${color}">${team}</div>
        <div class="tt-row"><span class="tt-label">Season start</span><span class="tt-val" style="color:var(--accent)">${scatterYear}</span></div>
        <div class="tt-row"><span class="tt-label">Offensive</span><span class="tt-val ${offVal>=0?'pos':'neg'}">${offVal>=0?'+':''}${offVal.toFixed(3)}</span></div>
        <div class="tt-row"><span class="tt-label">Defensive</span><span class="tt-val ${defVal>=0?'pos':'neg'}">${defVal>=0?'+':''}${defVal.toFixed(3)}</span></div>
      `);
    }).on('mouseleave', hideTooltip);
  });
}

// Scrubber
const scrubber = document.getElementById('year-scrubber');
const scrubberLabel = document.getElementById('scrubber-year-label');
scrubber.addEventListener('input', () => {
  scatterYear = +scrubber.value;
  scrubberLabel.textContent = scatterYear;
  renderScatter();
});

// Play button
const playBtn = document.getElementById('play-btn');
playBtn.addEventListener('click', () => {
  if (playTimer) {
    clearInterval(playTimer);
    playTimer = null;
    playBtn.textContent = '▶';
    playBtn.classList.remove('playing');
  } else {
    playBtn.textContent = '⏸';
    playBtn.classList.add('playing');
    if (scatterYear >= 2026) { scatterYear = 1897; scrubber.value = 1897; }
    playTimer = setInterval(() => {
      scatterYear++;
      if (scatterYear > 2026) {
        clearInterval(playTimer); playTimer = null;
        playBtn.textContent = '▶'; playBtn.classList.remove('playing');
        return;
      }
      scrubber.value = scatterYear;
      scrubberLabel.textContent = scatterYear;
      renderScatter();
    }, 1000);
  }
});

function renderHeatmap() {
  const container = document.getElementById('view-heatmap');
  const svg = d3.select('#heatmap-chart');
  svg.selectAll('*').remove();

  const activeTeams = ALL_TEAMS.filter(t => selectedTeams.has(t));
  if (activeTeams.length === 0) return;

  const allYears = [];
  for (let y = 1897; y <= 2026; y++) allYears.push(y);

  // Fit cells into available width: container is ~800px, label area 110px, right pad 8px
  const availW = Math.min(container.clientWidth || 800, 800);
  const labelW = 110;
  const rightPad = 8;
  const cellW = Math.floor((availW - labelW - rightPad) / allYears.length); // ~5px at 800
  const rowH = 20;
  const totalW = labelW + allYears.length * cellW + rightPad;
  const totalH = activeTeams.length * rowH + 36;

  svg.attr('width', totalW).attr('height', totalH);

  const colorScale = d3.scaleDiverging(t => d3.interpolateRdYlGn(t))
    .domain([-0.8, 0, 0.8]);

  // Year axis ticks every 10 years
  const tickYears = allYears.filter(y => y % 10 === 0);
  tickYears.forEach(yr => {
    svg.append('text')
      .attr('x', labelW + (yr - 1897) * cellW + cellW / 2)
      .attr('y', 10)
      .attr('text-anchor', 'middle')
      .attr('fill', 'var(--text-dim)')
      .attr('font-family', 'Barlow Condensed, sans-serif')
      .attr('font-size', '9px')
      .text(yr);
  });

  activeTeams.forEach((team, ti) => {
    const seasons = RAW[team];
    const seasonMap = {};
    seasons.forEach(row => { seasonMap[row[0]] = row; });
    const y = 36 + ti * rowH;
    const color = TEAM_COLORS[team] || '#888';

    // Dot + right-aligned label: dot at labelW-8, text right-aligned ending at labelW-14
    const labelG = svg.append('g');
    labelG.append('circle')
      .attr('cx', labelW - 6)
      .attr('cy', y + rowH / 2)
      .attr('r', 4)
      .attr('fill', color);
    labelG.append('text')
      .attr('x', labelW - 13)
      .attr('y', y + rowH / 2)
      .attr('text-anchor', 'end')
      .attr('dominant-baseline', 'middle')
      .attr('fill', 'var(--text)')
      .attr('font-family', 'Barlow Condensed, sans-serif')
      .attr('font-size', '11px')
      .attr('font-weight', '600')
      .text(team);

    allYears.forEach(yr => {
      const row = seasonMap[yr];
      if (!row) return;
      const val = getVal(row, metric);
      const rect = svg.append('rect')
        .attr('x', labelW + (yr - 1897) * cellW)
        .attr('y', y)
        .attr('width', Math.max(cellW - 1, 1))
        .attr('height', rowH - 2)
        .attr('fill', colorScale(val))
        .attr('rx', 1);

      rect.on('mouseover', (event) => {
        const mLabel = metric === 'off' ? 'Offensive' : metric === 'def' ? 'Defensive' : 'Combined';
        showTooltip(event, `
          <div class="tt-team" style="color:${color}">${team}</div>
          <div class="tt-row"><span class="tt-label">Season</span><span class="tt-val" style="color:var(--accent)">${yr}</span></div>
          <div class="tt-row"><span class="tt-label">${mLabel}</span><span class="tt-val ${val>=0?'pos':'neg'}">${val>=0?'+':''}${val.toFixed(3)}</span></div>
        `);
      }).on('mouseleave', hideTooltip);
    });
  });
}

// NETWORK VIEW
// ============================================================

let networkThreshold = 0.4;
let networkMinSeas = 15;
let networkYearFrom = 1897;
let networkYearTo = 2026;
let networkSimulation = null;

document.getElementById('threshold-slider').addEventListener('input', function() {
  networkThreshold = +this.value;
  document.getElementById('threshold-label').textContent = networkThreshold.toFixed(2);
  if (currentView === 'network') renderNetwork();
});
document.getElementById('minseas-slider').addEventListener('input', function() {
  networkMinSeas = +this.value;
  document.getElementById('minseas-label').textContent = networkMinSeas;
  if (currentView === 'network') renderNetwork();
});
document.getElementById('yearfrom-slider').addEventListener('input', function() {
  networkYearFrom = +this.value;
  if (networkYearFrom > networkYearTo) { networkYearTo = networkYearFrom; document.getElementById('yearto-slider').value = networkYearTo; document.getElementById('yearto-label').textContent = networkYearTo; }
  document.getElementById('yearfrom-label').textContent = networkYearFrom;
  if (currentView === 'network') renderNetwork();
});
document.getElementById('yearto-slider').addEventListener('input', function() {
  networkYearTo = +this.value;
  if (networkYearTo < networkYearFrom) { networkYearFrom = networkYearTo; document.getElementById('yearfrom-slider').value = networkYearFrom; document.getElementById('yearfrom-label').textContent = networkYearFrom; }
  document.getElementById('yearto-label').textContent = networkYearTo;
  if (currentView === 'network') renderNetwork();
});

function pearson(a, b) {
  // a, b: arrays of [year, val] — compute over shared years
  const mapA = {}, mapB = {};
  a.forEach(([y, v]) => mapA[y] = v);
  b.forEach(([y, v]) => mapB[y] = v);
  const shared = Object.keys(mapA).filter(y => mapB[y] !== undefined).map(Number);
  if (shared.length < 3) return { r: null, n: shared.length };
  const xs = shared.map(y => mapA[y]);
  const ys = shared.map(y => mapB[y]);
  const mx = xs.reduce((s,v)=>s+v,0)/xs.length;
  const my = ys.reduce((s,v)=>s+v,0)/ys.length;
  const num = xs.reduce((s,v,i)=>s+(v-mx)*(ys[i]-my),0);
  const den = Math.sqrt(xs.reduce((s,v)=>s+(v-mx)**2,0) * ys.reduce((s,v)=>s+(v-my)**2,0));
  return { r: den === 0 ? 0 : num/den, n: shared.length };
}

function buildNetworkData(teams, m) {
  // Build series per team filtered to selected year range: [[year, val], ...]
  const series = {};
  teams.forEach(t => {
    series[t] = RAW[t]
      .filter(row => row[0] >= networkYearFrom && row[0] <= networkYearTo)
      .map(row => [row[0], getVal(row, m)]);
  });

  const nodes = teams.map(t => ({ id: t, color: TEAM_COLORS[t] || '#888' }));
  const links = [];

  for (let i = 0; i < teams.length; i++) {
    for (let j = i + 1; j < teams.length; j++) {
      const { r, n } = pearson(series[teams[i]], series[teams[j]]);
      if (r === null || n < networkMinSeas) continue;
      if (Math.abs(r) >= networkThreshold) {
        links.push({ source: teams[i], target: teams[j], r, n });
      }
    }
  }
  return { nodes, links };
}

function renderNetwork() {
  const container = document.getElementById('view-network');
  const svg = d3.select('#network-chart');
  svg.selectAll('*').remove();
  if (networkSimulation) { networkSimulation.stop(); networkSimulation = null; }

  const W = container.clientWidth || 800;
  const H = container.clientHeight || 500;
  svg.attr('width', W).attr('height', H);

  const activeTeams = ALL_TEAMS.filter(t => selectedTeams.has(t));
  if (activeTeams.length < 2) {
    svg.append('text').attr('x', W/2).attr('y', H/2).attr('text-anchor','middle')
      .attr('fill','var(--text-dim)').attr('font-family','Barlow Condensed,sans-serif').attr('font-size','14px')
      .text('Select at least 2 teams');
    return;
  }

  const { nodes, links } = buildNetworkData(activeTeams, metric);

  // Legend keep-out zone dimensions (used by force below)
  const legPadX = 12, legPadY = 14;
  const legW = 160, legH = 58;

  if (links.length === 0) {
    svg.append('text').attr('x', W/2).attr('y', H/2).attr('text-anchor','middle')
      .attr('fill','var(--text-dim)').attr('font-family','Barlow Condensed,sans-serif').attr('font-size','13px')
      .text('No pairs exceed the threshold — try lowering Min |r| or From/To range');
    // Still draw the legend
    const lg = svg.append('g').attr('transform', `translate(${legPadX}, ${legPadY})`);
    lg.append('rect').attr('x',-4).attr('y',-4).attr('width', legW).attr('height', legH)
      .attr('fill','var(--surface)').attr('fill-opacity',0.95).attr('rx',4).attr('stroke','var(--border)').attr('stroke-width',1);
    [{col:'#1a9e97',label:'Positive correlation'},{col:'#c0392b',label:'Negative correlation'}].forEach(({col,label},i)=>{
      lg.append('line').attr('x1',4).attr('x2',26).attr('y1',i*20+10).attr('y2',i*20+10).attr('stroke',col).attr('stroke-width',3).attr('stroke-linecap','round');
      lg.append('text').attr('x',32).attr('y',i*20+14).attr('fill','var(--text-dim)').attr('font-family','Barlow Condensed,sans-serif').attr('font-size','11px').text(label);
    });
    lg.append('text').attr('x',4).attr('y',50).attr('fill','var(--text-dim)').attr('font-family','Barlow Condensed,sans-serif').attr('font-size','10px').attr('font-style','italic').text(`${networkYearFrom}–${networkYearTo}`);
    return;
  }

  // Edge width scale
  const maxR = d3.max(links, d => Math.abs(d.r));
  const strokeW = d3.scaleLinear().domain([networkThreshold, Math.max(maxR, networkThreshold+0.01)]).range([1.5, 7]).clamp(true);

  // Draw edges
  const linkSel = svg.append('g').selectAll('line')
    .data(links).enter().append('line')
    .attr('stroke', d => d.r > 0 ? '#1a9e97' : '#c0392b')
    .attr('stroke-width', d => strokeW(Math.abs(d.r)))
    .attr('stroke-opacity', 0.7)
    .attr('stroke-linecap', 'round');

  // Draw nodes
  const nodeG = svg.append('g').selectAll('g')
    .data(nodes).enter().append('g')
    .attr('cursor', 'grab')
    .call(d3.drag()
      .on('start', (event, d) => {
        if (!event.active) networkSimulation.alphaTarget(0.3).restart();
        d.fx = d.x; d.fy = d.y;
      })
      .on('drag', (event, d) => { d.fx = event.x; d.fy = event.y; })
      .on('end', (event, d) => {
        if (!event.active) networkSimulation.alphaTarget(0);
        d.fx = null; d.fy = null;
      })
    );

  nodeG.append('circle')
    .attr('r', 20)
    .attr('fill', d => d.color)
    .attr('fill-opacity', 0.88)
    .attr('stroke', '#fff')
    .attr('stroke-width', 1.5);

  nodeG.append('text')
    .attr('text-anchor', 'middle')
    .attr('dominant-baseline', 'middle')
    .attr('fill', '#fff')
    .attr('font-family', 'Barlow Condensed, sans-serif')
    .attr('font-size', '10px')
    .attr('font-weight', '700')
    .attr('pointer-events', 'none')
    .text(d => d.id.slice(0, 3).toUpperCase());

  // Tooltip on edges
  linkSel
    .on('mouseover', (event, d) => {
      const sign = d.r > 0 ? 'positive' : 'negative';
      const col  = d.r > 0 ? 'var(--positive)' : 'var(--negative)';
      showTooltip(event, `
        <div class="tt-team">${d.source.id || d.source} · ${d.target.id || d.target}</div>
        <div class="tt-row"><span class="tt-label">Correlation</span><span class="tt-val" style="color:${col}">${d.r>=0?'+':''}${d.r.toFixed(3)}</span></div>
        <div class="tt-row"><span class="tt-label">Direction</span><span class="tt-val">${sign}</span></div>
        <div class="tt-row"><span class="tt-label">Shared seasons</span><span class="tt-val">${d.n}</span></div>
      `);
    })
    .on('mouseleave', hideTooltip);

  // Tooltip on nodes
  nodeG.on('mouseover', (event, d) => {
    const connected = links.filter(l =>
      (l.source.id||l.source) === d.id || (l.target.id||l.target) === d.id
    ).sort((a,b) => Math.abs(b.r) - Math.abs(a.r));
    let html = `<div class="tt-team" style="color:${d.color}">${d.id}</div>`;
    if (connected.length === 0) {
      html += `<div style="color:var(--text-dim);font-size:0.75rem;margin-top:4px">No connections shown</div>`;
    } else {
      html += `<div style="color:var(--text-dim);font-size:0.7rem;margin:4px 0 2px;font-family:'Barlow Condensed',sans-serif;letter-spacing:0.06em;text-transform:uppercase;">Strongest links</div>`;
      connected.slice(0, 5).forEach(l => {
        const other = (l.source.id||l.source) === d.id ? (l.target.id||l.target) : (l.source.id||l.source);
        const col = l.r > 0 ? 'var(--positive)' : 'var(--negative)';
        html += `<div class="tt-row"><span class="tt-label">${other}</span><span class="tt-val" style="color:${col}">${l.r>=0?'+':''}${l.r.toFixed(3)}</span></div>`;
      });
    }
    showTooltip(event, html);
  }).on('mouseleave', hideTooltip);

  // Legend keep-out zone (top-left rectangle)
  const noGoX = legPadX + legW + 10;  // nodes must be right of this OR below noGoY
  const noGoY = legPadY + legH + 10;
  const nodeR = 22;

  function forceKeepOutLegend() {
    return function() {
      nodes.forEach(d => {
        if (d.x - nodeR < noGoX && d.y - nodeR < noGoY) {
          // Push whichever axis needs least movement to escape
          const pushRight = noGoX - (d.x - nodeR);
          const pushDown  = noGoY - (d.y - nodeR);
          if (pushRight < pushDown) d.x += pushRight * 0.3;
          else d.y += pushDown * 0.3;
        }
      });
    };
  }

  // Force simulation
  networkSimulation = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links).id(d => d.id).distance(d => {
      const base = 120;
      return d.r > 0 ? base * (1 - Math.abs(d.r) * 0.5) : base * (1 + Math.abs(d.r) * 0.5);
    }).strength(0.6))
    .force('charge', d3.forceManyBody().strength(-200))
    .force('center', d3.forceCenter(W / 2, H / 2))
    .force('collision', d3.forceCollide(26))
    .force('keepOutLegend', forceKeepOutLegend())
    .on('tick', () => {
      linkSel
        .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
        .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
      nodeG.attr('transform', d => {
        const x = Math.max(nodeR, Math.min(W - nodeR, d.x));
        const y = Math.max(nodeR, Math.min(H - nodeR, d.y));
        return `translate(${x},${y})`;
      });
    });

  // Legend rendered last — always on top of nodes
  const legG = svg.append('g').attr('transform', `translate(${legPadX}, ${legPadY})`);
  legG.append('rect').attr('x',-4).attr('y',-4).attr('width', legW).attr('height', legH)
    .attr('fill','var(--surface)').attr('fill-opacity',0.95).attr('rx',4)
    .attr('stroke','var(--border)').attr('stroke-width',1);
  [
    { col:'#1a9e97', label:'Positive correlation' },
    { col:'#c0392b', label:'Negative correlation' }
  ].forEach(({col, label}, i) => {
    legG.append('line').attr('x1',4).attr('x2',26).attr('y1',i*20+10).attr('y2',i*20+10)
      .attr('stroke',col).attr('stroke-width',3).attr('stroke-linecap','round');
    legG.append('text').attr('x',32).attr('y',i*20+14)
      .attr('fill','var(--text-dim)').attr('font-family','Barlow Condensed,sans-serif').attr('font-size','11px')
      .text(label);
  });
  legG.append('text').attr('x', 4).attr('y', 50)
    .attr('fill','var(--text-dim)').attr('font-family','Barlow Condensed,sans-serif').attr('font-size','10px').attr('font-style','italic')
    .text(`${networkYearFrom}–${networkYearTo}`);
}

// ============================================================
// ============================================================
buildTeamList();
showView('scatter');
renderScatter();

window.addEventListener('resize', () => {
  if (currentView === 'scatter') renderScatter();
});
</script>
