<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AFL Goal Angle Visualizer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f5f5f0;
    color: #111;
    padding: 1.5rem;
    min-height: 100vh;
  }
  h1 { font-size: 1.3rem; font-weight: 500; margin-bottom: 1rem; color: #111; }
  #afl-wrap { max-width: 900px; margin: 0 auto; }
  #afl-canvas {
    display: block; width: 100%; cursor: crosshair;
    border-radius: 10px; border: 0.5px solid rgba(0,0,0,0.15);
    background: #fff;
  }
  #ctrl {
    display: flex; align-items: center; gap: 14px;
    margin: 0 0 12px; flex-wrap: wrap;
  }
  #ctrl label { font-size: 14px; color: #555; white-space: nowrap; }
  #ctrl input[type=range] { flex: 1; min-width: 120px; accent-color: #2a6496; }
  #post-val { font-size: 15px; font-weight: 500; color: #111; min-width: 48px; }
  #afl-info { display: flex; gap: 12px; margin-top: 12px; flex-wrap: wrap; }
  .afl-stat {
    background: #efefea; border-radius: 8px;
    padding: 10px 16px; flex: 1; min-width: 100px;
  }
  .afl-stat .lbl { font-size: 12px; color: #666; margin-bottom: 2px; }
  .afl-stat .val { font-size: 20px; font-weight: 500; color: #111; }
  #afl-hint { font-size: 13px; color: #777; margin-top: 8px; text-align: center; }

  @media (prefers-color-scheme: dark) {
    body { background: #1a1a1a; color: #e8e8e8; }
    h1 { color: #e8e8e8; }
    #ctrl label { color: #aaa; }
    #post-val { color: #e8e8e8; }
    .afl-stat { background: #2a2a2a; }
    .afl-stat .lbl { color: #888; }
    .afl-stat .val { color: #e8e8e8; }
    #afl-hint { color: #888; }
    #afl-canvas { border-color: rgba(255,255,255,0.12); }
  }
</style>
</head>
<body>
<div id="afl-wrap">
  <h1>AFL Goal Angle Visualizer</h1>
  <div id="ctrl">
    <label>Goal post width</label>
    <input type="range" id="post-slider" min="5" max="10" step="0.1" value="6.4">
    <span id="post-val">6.4m</span>
  </div>
  <canvas id="afl-canvas"></canvas>
  <div id="afl-info">
    <div class="afl-stat"><div class="lbl">Goal angle</div><div class="val" id="stat-angle">—</div></div>
    <div class="afl-stat"><div class="lbl">Distance from goal</div><div class="val" id="stat-dist">—</div></div>
    <div class="afl-stat"><div class="lbl">Left / right of centre</div><div class="val" id="stat-offset">—</div></div>
  </div>
  <div id="afl-hint">Click anywhere on the field (within 60m of goals) to see the goal angle</div>
</div>

<script>
(function() {
  const canvas    = document.getElementById('afl-canvas');
  const ctx       = canvas.getContext('2d');
  const slider    = document.getElementById('post-slider');
  const postValEl = document.getElementById('post-val');

  const FIELD_W_M = 140;
  const HALF_H_M  = 80;
  const ARC_R     = 50;
  const MAX_DIST  = 60;
  const a_el      = FIELD_W_M / 2;
  const EL_CY     = HALF_H_M;

  const ISO_MIN = 5;
  const ISO_MAX = 30;

  function getPostSep() { return parseFloat(slider.value); }
  function getBehindX(ps) { return ps * 1.5; }
  function getB(bx) { return EL_CY / Math.sqrt(1 - (bx / a_el) ** 2); }

  function inField(mx, my, bx) {
    if (my < 0 || my > HALF_H_M) return false;
    const b = getB(bx);
    return (mx / a_el) ** 2 + ((my - EL_CY) / b) ** 2 <= 1;
  }

  function computeAngle(mx, my, ps) {
    const lx = -ps/2 - mx, ly = -my;
    const rx =  ps/2 - mx, ry = -my;
    const dot  = lx*rx + ly*ry;
    const cosA = dot / (Math.sqrt(lx*lx+ly*ly) * Math.sqrt(rx*rx+ry*ry));
    return Math.acos(Math.max(-1, Math.min(1, cosA))) * 180 / Math.PI;
  }

  function isoPoints(deg, ps, bx) {
    const alpha = deg * Math.PI / 180;
    const d  = ps / 2;
    const Rc = d / Math.sin(alpha);
    const yc = d / Math.tan(alpha);
    const pts = [];
    const STEPS = 600;
    for (let i = 0; i <= STEPS; i++) {
      const x = -Rc + 2 * Rc * i / STEPS;
      const inner = Rc*Rc - x*x;
      if (inner < 0) continue;
      const y = yc + Math.sqrt(inner);
      if (y < 0 || y > HALF_H_M) continue;
      if (!inField(x, y, bx)) continue;
      pts.push([x, y]);
    }
    return pts;
  }

  function arcEllipseIntersect(bx) {
    const b = getB(bx);
    function f(y) {
      const x2 = ARC_R*ARC_R - y*y;
      if (x2 < 0) return 1;
      return x2/(a_el*a_el) + (y-EL_CY)**2/(b*b) - 1;
    }
    if (f(0) >= 0) return null;
    if (f(ARC_R) <= 0) return null;
    let lo = 0, hi = ARC_R;
    for (let i = 0; i < 80; i++) {
      const mid = (lo+hi)/2;
      f(lo)*f(mid) <= 0 ? hi=mid : lo=mid;
    }
    return (lo+hi)/2;
  }

  function isoColor(deg, isDark) {
    const t   = (deg - ISO_MIN) / (ISO_MAX - ISO_MIN);
    const hue = Math.round(240 - t * 240);
    const lit = isDark ? 65 : 45;
    return `hsl(${hue},85%,${lit}%)`;
  }

  function getMetrics() {
    const W = canvas.offsetWidth || 700;
    canvas.width  = W;
    canvas.height = Math.round(W * 0.62);
    const H    = canvas.height;
    const padX = W * 0.07;
    const padT = H * 0.13;
    const padB = H * 0.06;
    const scale = Math.min((W - padX*2) / FIELD_W_M, (H - padT - padB) / HALF_H_M);
    return { W, H, scale, ox: W/2, oy: padT };
  }

  function mToC(mx, my, m) { return [m.ox + mx*m.scale, m.oy + my*m.scale]; }
  function cToM(cx, cy, m) { return [(cx - m.ox)/m.scale, (cy - m.oy)/m.scale]; }

  let clickPos = null;
  let metrics  = getMetrics();

  function draw() {
    const m = metrics;
    const { W, H, scale, ox } = m;
    const POST_SEP = getPostSep();
    const BEHIND_X = getBehindX(POST_SEP);
    const b_el     = getB(BEHIND_X);

    ctx.clearRect(0, 0, W, H);

    const isDark     = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const grassColor = isDark ? '#1a2e1a' : '#d4edba';
    const lineColor  = isDark ? 'rgba(255,255,255,0.45)' : 'rgba(0,0,0,0.42)';
    const gridColor  = isDark ? 'rgba(255,255,255,0.15)' : 'rgba(0,0,0,0.12)';
    const postColor  = isDark ? '#f5c842' : '#c8820a';
    const behindCol  = isDark ? '#bbb'    : '#777';
    const arcColor   = isDark ? 'rgba(255,255,255,0.6)' : 'rgba(0,0,0,0.5)';
    const angleLineC = isDark ? 'rgba(120,180,255,0.9)'  : 'rgba(0,80,200,0.75)';
    const angleFillC = isDark ? 'rgba(120,180,255,0.18)' : 'rgba(0,80,200,0.12)';
    const angleArcC  = isDark ? 'rgba(120,180,255,0.55)' : 'rgba(0,80,200,0.45)';
    const angleTxtC  = isDark ? '#78b4ff' : '#0050c8';
    const dotColor   = isDark ? '#ff9f5a' : '#d04000';
    const labelBg    = isDark ? 'rgba(25,25,25,0.9)' : 'rgba(255,255,255,0.93)';
    const labelTxt   = isDark ? '#e8e8e8' : '#111';

    const [, goalY]  = mToC(0, 0, m);
    const [ecx, ecy] = mToC(0, EL_CY, m);
    const erx = a_el * scale;
    const ery = b_el * scale;
    const sinT = (goalY - ecy) / ery;
    const tTop = Math.asin(Math.max(-1, Math.min(1, sinT)));

    // Field fill
    ctx.save();
    ctx.beginPath(); ctx.rect(0, goalY, W, H - goalY); ctx.clip();
    ctx.beginPath(); ctx.ellipse(ecx, ecy, erx, ery, 0, 0, Math.PI*2);
    ctx.fillStyle = grassColor; ctx.fill();
    ctx.restore();

    // 10m lateral grid lines
    ctx.strokeStyle = gridColor; ctx.lineWidth = 1; ctx.setLineDash([4, 4]);
    for (let xm = 0; xm <= a_el; xm += 10) {
      (xm === 0 ? [0] : [xm, -xm]).forEach(x => {
        const term = 1 - (x/a_el)**2;
        if (term < 0) return;
        const yBound = EL_CY - b_el * Math.sqrt(term);
        const yStart = Math.max(0, yBound);
        if (yStart >= HALF_H_M) return;
        const [cx1,cy1] = mToC(x, yStart, m);
        const [cx2,cy2] = mToC(x, HALF_H_M, m);
        ctx.beginPath(); ctx.moveTo(cx1,cy1); ctx.lineTo(cx2,cy2); ctx.stroke();
      });
    }
    ctx.setLineDash([]);

    // Isoangle curves 5°–30°
    const fs_base = Math.round(scale * 4.0);
    for (let deg = ISO_MAX; deg >= ISO_MIN; deg--) {
      const pts   = isoPoints(deg, POST_SEP, BEHIND_X);
      if (pts.length < 2) continue;
      const color = isoColor(deg, isDark);
      const major = (deg % 5 === 0);
      ctx.strokeStyle = color;
      ctx.lineWidth   = major ? 2.5 : 1.2;
      ctx.globalAlpha = major ? 0.95 : 0.6;
      ctx.beginPath();
      let penDown = false;
      for (const [fx, fy] of pts) {
        const [cx2, cy2] = mToC(fx, fy, m);
        if (!penDown) { ctx.moveTo(cx2, cy2); penDown = true; }
        else ctx.lineTo(cx2, cy2);
      }
      ctx.stroke();
      ctx.globalAlpha = 1;

      if (major || deg === ISO_MIN) {
        let best = null;
        for (const p of pts) { if (!best || p[0] > best[0]) best = p; }
        if (best) {
          const [lx, ly] = mToC(best[0] + 1.5, best[1], m);
          if (lx < W - 5) {
            ctx.font         = `${major ? '500' : '400'} ${Math.round(scale*(major?3.4:2.8))}px sans-serif`;
            ctx.fillStyle    = color;
            ctx.textAlign    = 'left';
            ctx.textBaseline = 'middle';
            ctx.fillText(deg + '°', lx, ly);
            ctx.textBaseline = 'alphabetic';
          }
        }
      }
    }

    // Ellipse boundary
    ctx.beginPath();
    ctx.ellipse(ecx, ecy, erx, ery, 0, tTop, Math.PI - tTop, false);
    ctx.strokeStyle = lineColor; ctx.lineWidth = 2; ctx.stroke();

    // Goal line between behind posts
    const [bRx, bRy] = mToC( BEHIND_X, 0, m);
    const [bLx, bLy] = mToC(-BEHIND_X, 0, m);
    ctx.beginPath(); ctx.moveTo(bLx,bLy); ctx.lineTo(bRx,bRy);
    ctx.strokeStyle = lineColor; ctx.lineWidth = 1.5; ctx.stroke();

    // 50m arc
    const intersectY = arcEllipseIntersect(BEHIND_X);
    ctx.strokeStyle = arcColor; ctx.lineWidth = 2;
    ctx.setLineDash([Math.round(scale*1.2), Math.round(scale*0.8)]);
    ctx.beginPath(); let drawing = false;
    for (let i = 0; i <= 720; i++) {
      const theta = Math.PI * (1 - i/720);
      const fx = ARC_R*Math.cos(theta), fy = ARC_R*Math.sin(theta);
      const [cx2, cy2] = mToC(fx, fy, m);
      const inside = inField(fx, fy, BEHIND_X);
      if (inside) {
        if (!drawing) { ctx.moveTo(cx2,cy2); drawing=true; } else ctx.lineTo(cx2,cy2);
      } else {
        if (drawing) { ctx.stroke(); ctx.beginPath(); drawing=false; }
      }
    }
    if (drawing) ctx.stroke();
    ctx.setLineDash([]);

    ctx.font = `${fs_base}px sans-serif`; ctx.fillStyle = lineColor;
    if (intersectY !== null) {
      const ix = Math.sqrt(Math.max(0, ARC_R*ARC_R - intersectY*intersectY));
      const [lx,ly] = mToC(ix + 2.5, intersectY - 1, m);
      ctx.textAlign = 'left'; ctx.fillText('50m', lx, ly);
    }

    // Posts
    [
      {dx:-BEHIND_X,   col:behindCol, h:scale*4, w:2.5},
      {dx:-POST_SEP/2, col:postColor, h:scale*6, w:3.5},
      {dx: POST_SEP/2, col:postColor, h:scale*6, w:3.5},
      {dx: BEHIND_X,   col:behindCol, h:scale*4, w:2.5},
    ].forEach(({dx,col,h,w}) => {
      const [px,py] = mToC(dx, 0, m);
      ctx.beginPath(); ctx.moveTo(px,py); ctx.lineTo(px,py-h);
      ctx.strokeStyle=col; ctx.lineWidth=w; ctx.stroke();
      ctx.beginPath(); ctx.arc(px,py,4,0,Math.PI*2); ctx.fillStyle=col; ctx.fill();
    });

    const fs_lbl = Math.round(fs_base * 0.88);
    ctx.font=`${fs_lbl}px sans-serif`; ctx.fillStyle=lineColor; ctx.textAlign='center';
    const lblY = goalY - scale*7;
    [[-POST_SEP/2,'G'],[POST_SEP/2,'G'],[-BEHIND_X,'B'],[BEHIND_X,'B']].forEach(([dx,lbl]) => {
      ctx.fillText(lbl, mToC(dx,0,m)[0], lblY);
    });
    const [,halfLblY] = mToC(0, HALF_H_M - 4, m);
    ctx.fillText('← 140m wide →', ox, halfLblY);

    // Click annotation
    if (clickPos) {
      const [cmx,cmy] = clickPos;
      const [cpx,cpy] = mToC(cmx, cmy, m);
      const lp = mToC(-POST_SEP/2, 0, m);
      const rp = mToC( POST_SEP/2, 0, m);
      const angleLR = Math.atan2(lp[1]-cpy, lp[0]-cpx);
      const angleRR = Math.atan2(rp[1]-cpy, rp[0]-cpx);
      const angle   = computeAngle(cmx, cmy, POST_SEP);

      ctx.beginPath(); ctx.moveTo(cpx,cpy); ctx.lineTo(lp[0],lp[1]);
      ctx.strokeStyle=angleLineC; ctx.lineWidth=2; ctx.stroke();
      ctx.beginPath(); ctx.moveTo(cpx,cpy); ctx.lineTo(rp[0],rp[1]); ctx.stroke();

      const arcR2  = Math.min(26*scale, 36);
      const startA = Math.min(angleLR, angleRR);
      const endA   = Math.max(angleLR, angleRR);
      ctx.beginPath(); ctx.moveTo(cpx,cpy); ctx.arc(cpx,cpy,arcR2,startA,endA); ctx.closePath();
      ctx.fillStyle=angleFillC; ctx.fill();
      ctx.strokeStyle=angleArcC; ctx.lineWidth=1; ctx.stroke();

      const angleTxt = angle.toFixed(1)+'°';
      const fs_a = Math.round(fs_base*0.95);
      ctx.font=`500 ${fs_a}px sans-serif`;
      const tw=ctx.measureText(angleTxt).width, pX=10, pY=6;
      const bW=tw+pX*2, bH=fs_a+pY*2, lbx=cpx-bW/2, lby=cpy+16;
      ctx.fillStyle=labelBg; ctx.beginPath(); ctx.roundRect(lbx,lby,bW,bH,6); ctx.fill();
      ctx.strokeStyle=angleArcC; ctx.lineWidth=1; ctx.stroke();
      ctx.fillStyle=angleTxtC; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(angleTxt, cpx, lby+bH/2); ctx.textBaseline='alphabetic';

      ctx.beginPath(); ctx.arc(cpx,cpy,5.5,0,Math.PI*2); ctx.fillStyle=dotColor; ctx.fill();

      const distTxt = cmy.toFixed(1)+'m from goal';
      const sideStr = cmx < -0.2 ? 'left' : cmx > 0.2 ? 'right' : '';
      const offTxt  = Math.abs(cmx) < 0.2 ? 'on centre line' : Math.abs(cmx).toFixed(1)+'m '+sideStr;
      const fs2 = Math.round(fs_base*0.78);
      ctx.font=`500 ${fs2}px sans-serif`;
      const l1w=ctx.measureText(distTxt).width;
      ctx.font=`${fs2}px sans-serif`;
      const l2w=ctx.measureText(offTxt).width;
      const lbPX=10, lbPY=7, lbGap=5;
      const lbBW=Math.max(l1w,l2w)+lbPX*2, lbBH=fs2*2+lbGap+lbPY*2;
      let lbLeft=cpx+14; if(lbLeft+lbBW>W-8) lbLeft=cpx-14-lbBW;
      let lbTop=cpy-lbBH/2; if(lbTop+lbBH>lby-4) lbTop=lby-4-lbBH; if(lbTop<4) lbTop=4;
      ctx.fillStyle=labelBg; ctx.beginPath(); ctx.roundRect(lbLeft,lbTop,lbBW,lbBH,6); ctx.fill();
      ctx.strokeStyle=isDark?'rgba(255,160,90,0.5)':'rgba(180,60,0,0.3)'; ctx.lineWidth=1; ctx.stroke();
      ctx.fillStyle=labelTxt; ctx.textAlign='left'; ctx.textBaseline='top';
      ctx.font=`500 ${fs2}px sans-serif`; ctx.fillText(distTxt, lbLeft+lbPX, lbTop+lbPY);
      ctx.font=`${fs2}px sans-serif`; ctx.fillStyle=isDark?'#bbb':'#555';
      ctx.fillText(offTxt, lbLeft+lbPX, lbTop+lbPY+fs2+lbGap); ctx.textBaseline='alphabetic';

      document.getElementById('stat-angle').textContent  = angle.toFixed(1)+'°';
      document.getElementById('stat-dist').textContent   = cmy.toFixed(1)+'m';
      document.getElementById('stat-offset').textContent =
        Math.abs(cmx) < 0.2 ? 'on centre' : Math.abs(cmx).toFixed(1)+'m '+sideStr;
    }
  }

  canvas.addEventListener('click', function(e) {
    const rect=canvas.getBoundingClientRect(), sr=canvas.width/rect.width;
    const [mx,my]=cToM((e.clientX-rect.left)*sr,(e.clientY-rect.top)*sr,metrics);
    const BEHIND_X=getBehindX(getPostSep());
    if (!inField(mx,my,BEHIND_X)) {
      document.getElementById('afl-hint').textContent='Click within the field boundary.';
      clickPos=null; draw(); return;
    }
    if (Math.sqrt(mx*mx+my*my)>MAX_DIST) {
      document.getElementById('afl-hint').textContent='Too far from goal — stay within 60m.';
      clickPos=null; draw(); return;
    }
    document.getElementById('afl-hint').textContent='Click anywhere else to compare';
    clickPos=[mx,my]; draw();
  });

  canvas.addEventListener('mousemove', function(e) {
    const rect=canvas.getBoundingClientRect(), sr=canvas.width/rect.width;
    const [mx,my]=cToM((e.clientX-rect.left)*sr,(e.clientY-rect.top)*sr,metrics);
    const BEHIND_X=getBehindX(getPostSep());
    canvas.style.cursor=(inField(mx,my,BEHIND_X)&&Math.sqrt(mx*mx+my*my)<=MAX_DIST)?'crosshair':'default';
  });

  slider.addEventListener('input', function() {
    postValEl.textContent=parseFloat(this.value).toFixed(1)+'m'; draw();
  });

  window.addEventListener('resize', function() { metrics=getMetrics(); draw(); });
  metrics=getMetrics(); draw();
})();
</script>
</body>
</html>
